<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Tracker | 6-Month Journey</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-main">
                <h1><i class="fas fa-shield-haltered"></i> Cyber Security Tracker</h1>
                <p>6 Months to Security Analyst • 240 Days • 90 Mins/Day</p>
            </div>
            <div class="profile-card">
                <div class="profile-text">
                    <strong>IT Manager, 11 Years</strong>
                    <span>BTech CS → Security Analyst</span>
                </div>
                <div class="overall-progress">
                    <div class="progress-row">
                        <span>Overall Progress</span>
                        <span id="overallPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="overallFill"></div>
                    </div>
                    <div class="progress-stats">
                        <span id="completedDays">0</span> / <span id="totalDays">240</span> days
                    </div>
                </div>
            </div>
        </div>

        <!-- Phase Tabs -->
        <div class="phase-tabs" id="phaseTabs"></div>

        <!-- Weeks Container -->
        <div class="weeks-container" id="weeksContainer"></div>

        <!-- Toast Message -->
        <div id="toastMsg" class="toast hidden">
            <i class="fas fa-check-circle"></i> Saved to Cloud
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>📘 Weekdays Only • 90 Minutes • Free Resources Only</p>
            <p class="small">✅ Progress auto-saves • Click week to expand</p>
        </div>
    </div>

    <script src="settings.js"></script>
    <script src="curriculum-data.js"></script>
    <script src="google-sync.js"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Tracker | 6-Month Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --dark: #0a0c10; --card-bg: #1a1d24; --border: #30363d; --text: #e6edf3; --text-dim: #b1bac4; --cyan: #2b9c9c; --green: #3fb950; --blue: #2d7ff9; --orange: #f0883e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; }
        .app { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: var(--card-bg); border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
        .header-main h1 { font-size: 1.75rem; margin-bottom: 8px; }
        .header-main h1 i { color: var(--cyan); margin-right: 12px; }
        .header-main p { color: var(--text-dim); }
        .profile-card { background: #252a33; padding: 16px 20px; border-radius: 12px; min-width: 260px; }
        .profile-text { margin-bottom: 12px; font-size: 0.85rem; }
        .profile-text strong { color: var(--cyan); display: block; }
        .overall-progress { width: 100%; }
        .progress-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; color: var(--text-dim); }
        .progress-bar { background: var(--dark); border-radius: 8px; height: 8px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--cyan), var(--green)); width: 0%; height: 100%; transition: width 0.3s; }
        .progress-stats { font-size: 0.75rem; color: var(--text-dim); text-align: right; margin-top: 6px; }
        .phase-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .phase-btn { padding: 10px 20px; background: transparent; border: none; color: var(--text-dim); font-size: 0.9rem; font-weight: 500; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .phase-btn:hover { background: var(--card-bg); color: var(--text); }
        .phase-btn.active { color: var(--cyan); background: var(--card-bg); }
        .week-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
        .week-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; cursor: pointer; background: #252a33; transition: background 0.2s; }
        .week-header:hover { background: var(--dark); }
        .week-title { display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .week-title i { transition: transform 0.2s; color: var(--cyan); }
        .week-card.open .week-title i { transform: rotate(90deg); }
        .week-progress { display: flex; align-items: center; gap: 15px; }
        .week-progress-bar { width: 120px; height: 6px; background: var(--dark); border-radius: 4px; overflow: hidden; }
        .week-progress-fill { height: 100%; background: var(--green); width: 0%; }
        .week-progress-text { font-size: 0.85rem; color: var(--text-dim); }
        .days-grid { display: none; padding: 20px; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
        .week-card.open .days-grid { display: grid; }
        .day-card { background: #252a33; border-radius: 12px; padding: 16px; border-left: 4px solid var(--border); transition: all 0.2s; }
        .day-card.today { border-left-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
        .day-card.completed { background: #1e3a2f; border-left-color: var(--green); }
        .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .day-name { font-weight: 600; font-size: 1rem; }
        .day-name i { margin-right: 8px; }
        .check-icon { color: var(--green); font-size: 1.2rem; }
        .slot { margin-bottom: 12px; }
        .slot-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; color: var(--cyan); margin-bottom: 4px; }
        .slot a { color: var(--blue); text-decoration: none; font-size: 0.85rem; display: block; word-break: break-word; }
        .slot a:hover { text-decoration: underline; color: var(--text); }
        .slot-note { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
        .note-text { font-size: 0.85rem; color: var(--text-dim); font-style: italic; }
        .mark-btn { width: 100%; margin-top: 12px; padding: 8px; background: var(--dark); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .mark-btn:hover { background: var(--green); border-color: var(--green); color: var(--dark); }
        .mark-btn.done { background: var(--green); color: var(--dark); cursor: default; opacity: 0.7; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: var(--dark); padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px; z-index: 1000; }
        .toast.hidden { display: none; }
        .footer { margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.8rem; }
        .small { font-size: 0.7rem; margin-top: 8px; }
        @media (max-width: 768px) { .app { padding: 12px; } .header { flex-direction: column; } .phase-tabs { overflow-x: auto; flex-wrap: nowrap; } .phase-btn { white-space: nowrap; } .days-grid { grid-template-columns: 1fr; } .week-header { flex-direction: column; gap: 10px; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-main">
                <h1><i class="fas fa-shield-haltered"></i> Cyber Security Tracker</h1>
                <p>6 Months to Security Analyst • 240 Days • 90 Mins/Day</p>
            </div>
            <div class="profile-card">
                <div class="profile-text">
                    <strong>IT Manager, 11 Years</strong>
                    <span>BTech CS → Security Analyst</span>
                </div>
                <div class="overall-progress">
                    <div class="progress-row"><span>Overall Progress</span><span id="overallPercent">0%</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="overallFill"></div></div>
                    <div class="progress-stats"><span id="completedDays">0</span> / <span id="totalDays">240</span> days</div>
                </div>
            </div>
        </div>
        <div class="phase-tabs" id="phaseTabs"></div>
        <div class="weeks-container" id="weeksContainer"></div>
        <div id="toastMsg" class="toast hidden"><i class="fas fa-check-circle"></i> Saved</div>
        <div class="footer"><p>📘 Weekdays Only • 90 Minutes • Free Resources</p><p class="small">✅ Progress auto-saves • Click week to expand</p></div>
    </div>

    <script>
        // ========== SETTINGS ==========
        const APP = {
            storageKey: 'cy6',
            totalDays: 240,
            daysPerWeek: 5,
            phases: [
                { id: 0, name: 'Phase 1: Foundations', weeks: 4, startDay: 1 },
                { id: 1, name: 'Phase 2: Networking & OS', weeks: 4, startDay: 21 },
                { id: 2, name: 'Phase 3: Security Tools', weeks: 4, startDay: 41 },
                { id: 3, name: 'Phase 4: Defensive Security', weeks: 4, startDay: 61 },
                { id: 4, name: 'Phase 5: Offensive Security', weeks: 4, startDay: 81 },
                { id: 5, name: 'Phase 6: Analysis & SIEM', weeks: 4, startDay: 101 },
                { id: 6, name: 'Phase 7: Cloud Security', weeks: 4, startDay: 121 },
                { id: 7, name: 'Phase 8: Labs & Projects', weeks: 4, startDay: 141 },
                { id: 8, name: 'Phase 9: Cert Prep', weeks: 4, startDay: 161 },
                { id: 9, name: 'Phase 10: Interview Prep', weeks: 4, startDay: 181 }
            ],
            getDayNumber: function(phaseId, week, day) {
                const phase = this.phases[phaseId];
                return phase.startDay + (week * 5) + day;
            }
        };

        // ========== CURRICULUM DATA WITH WATCH/READ/LAB ==========
        const CURRICULUM = {};
        
        // Build Phase 0 with complete data (Watch, Read, Lab, Notes)
        const phase0Weeks = [];
        
        // Week 1 data - complete with all sections
        const week1Data = [
            { watch: 'https://www.youtube.com/watch?v=inWWhr5tnEA', watchText: '🎬 Cybersecurity Fundamentals', read: 'https://www.cisa.gov/cybersecurity-basics', readText: '📖 CISA Cybersecurity Basics', lab: 'https://tryhackme.com/r/room/introtocyber', labText: '💻 TryHackMe: Intro to Cyber Security', notes: '📝 CIA triad, basic security concepts' },
            { watch: 'https://www.youtube.com/watch?v=5k9e1xYp3HI', watchText: '🎬 Security Principles', read: 'https://csrc.nist.gov/glossary', readText: '📖 NIST Cybersecurity Glossary', lab: 'https://tryhackme.com/r/room/securityprinciples', labText: '💻 TryHackMe: Security Principles', notes: '📝 Authentication, authorization, accounting' },
            { watch: 'https://www.youtube.com/watch?v=z5nc9MDbvkw', watchText: '🎬 CIA Triad Deep Dive', read: 'https://www.sans.org/security-resources/', readText: '📖 SANS Reading Room', lab: 'https://tryhackme.com/r/room/introtois', labText: '💻 TryHackMe: Intro to Information Security', notes: '📝 Confidentiality, Integrity, Availability' },
            { watch: 'https://www.youtube.com/watch?v=sdpxddDzXfE', watchText: '🎬 Threats & Vulnerabilities', read: 'https://owasp.org/www-project-top-ten/', readText: '📖 OWASP Top 10', lab: 'https://tryhackme.com/r/room/vulnerabilities101', labText: '💻 TryHackMe: Vulnerabilities 101', notes: '📝 Risk assessment basics' },
            { watch: 'https://www.youtube.com/watch?v=auW3bT7XJbM', watchText: '🎬 Security Controls', read: 'https://www.iso.org/isoiec-27001-information-security.html', readText: '📖 ISO 27001 Overview', lab: 'https://tryhackme.com/r/room/securityframeworks', labText: '💻 TryHackMe: Security Frameworks', notes: '📝 Administrative, technical, physical controls' }
        ];
        
        // Week 2 data
        const week2Data = [
            { watch: 'https://www.youtube.com/watch?v=inWWhr5tnEA', watchText: '🎬 Cybersecurity Review', read: 'https://www.cisa.gov/cybersecurity-basics', readText: '📖 CISA Review', lab: 'https://tryhackme.com/r/room/introtocyber', labText: '💻 TryHackMe Review', notes: '📝 Review and practice' },
            { watch: 'https://www.youtube.com/watch?v=5k9e1xYp3HI', watchText: '🎬 Security Principles Review', read: 'https://csrc.nist.gov/glossary', readText: '📖 NIST Review', lab: 'https://tryhackme.com/r/room/securityprinciples', labText: '💻 Principles Lab', notes: '📝 Apply to scenarios' },
            { watch: 'https://www.youtube.com/watch?v=z5nc9MDbvkw', watchText: '🎬 CIA Triad Examples', read: 'https://www.sans.org/security-resources/', readText: '📖 SANS Articles', lab: 'https://tryhackme.com/r/room/introtois', labText: '💻 InfoSec Lab', notes: '📝 Real-world examples' },
            { watch: 'https://www.youtube.com/watch?v=sdpxddDzXfE', watchText: '🎬 Vulnerability Assessment', read: 'https://owasp.org/www-project-top-ten/', readText: '📖 OWASP Deep Dive', lab: 'https://tryhackme.com/r/room/vulnerabilities101', labText: '💻 Vulns Lab', notes: '📝 Identify vulnerabilities' },
            { watch: 'https://www.youtube.com/watch?v=auW3bT7XJbM', watchText: '🎬 Controls Review', read: 'https://www.iso.org/isoiec-27001-information-security.html', readText: '📖 ISO Controls', lab: 'https://tryhackme.com/r/room/securityframeworks', labText: '💻 Frameworks Lab', notes: '📝 Map controls to requirements' }
        ];
        
        phase0Weeks[0] = week1Data;
        phase0Weeks[1] = week2Data;
        phase0Weeks[2] = week1Data.map(d => ({ ...d, notes: d.notes + ' - Practice' }));
        phase0Weeks[3] = week2Data.map(d => ({ ...d, notes: d.notes + ' - Apply' }));
        
        // Convert to the format expected by renderer
        CURRICULUM[0] = phase0Weeks.map(week => 
            week.map(day => ({
                watch: { url: day.watch, text: day.watchText },
                read: { url: day.read, text: day.readText },
                lab: { url: day.lab, text: day.labText },
                notes: day.notes
            }))
        );
        
        // Fill phases 1-9 with placeholder data (still has all sections)
        for (let p = 1; p < 10; p++) {
            CURRICULUM[p] = [];
            for (let w = 0; w < 4; w++) {
                CURRICULUM[p][w] = [];
                for (let d = 0; d < 5; d++) {
                    CURRICULUM[p][w][d] = {
                        watch: { url: 'https://www.youtube.com/watch?v=qrRqN2HZw98', text: '🎬 Advanced Security Concepts' },
                        read: { url: 'https://www.securityweek.com/', text: '📖 Security Week Articles' },
                        lab: { url: 'https://tryhackme.com/r/room/securityoperations', text: '💻 Security Operations Lab' },
                        notes: '📝 Continue building your cybersecurity knowledge'
                    };
                }
            }
        }

        // ========== MAIN APP ==========
        const Tracker = {
            currentPhase: 0,
            completedDays: [],
            
            init: function() {
                const saved = localStorage.getItem(APP.storageKey);
                this.completedDays = saved ? JSON.parse(saved) : [];
                this.render();
            },
            
            saveData: function() {
                localStorage.setItem(APP.storageKey, JSON.stringify(this.completedDays));
                this.updateProgress();
            },
            
            render: function() {
                this.renderPhases();
                this.renderWeeks();
                this.updateProgress();
            },
            
            renderPhases: function() {
                const container = document.getElementById('phaseTabs');
                if (!container) return;
                container.innerHTML = '';
                APP.phases.forEach((phase, i) => {
                    const btn = document.createElement('button');
                    btn.className = `phase-btn ${i === this.currentPhase ? 'active' : ''}`;
                    btn.textContent = phase.name;
                    btn.onclick = () => { this.currentPhase = i; this.render(); };
                    container.appendChild(btn);
                });
            },
            
            renderWeeks: function() {
                const container = document.getElementById('weeksContainer');
                if (!container) return;
                container.innerHTML = '';
                const phase = APP.phases[this.currentPhase];
                for (let w = 0; w < phase.weeks; w++) this.renderWeek(w, container);
            },
            
            renderWeek: function(weekIndex, container) {
                const phase = APP.phases[this.currentPhase];
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week-card';
                weekDiv.dataset.week = weekIndex;
                
                let done = 0;
                for (let d = 0; d < 5; d++) {
                    if (this.completedDays.includes(APP.getDayNumber(this.currentPhase, weekIndex, d))) done++;
                }
                const percent = (done / 5) * 100;
                
                const header = document.createElement('div');
                header.className = 'week-header';
                header.onclick = () => weekDiv.classList.toggle('open');
                header.innerHTML = `
                    <div class="week-title"><i class="fas fa-chevron-right"></i><span>Week ${weekIndex + 1} • Days ${phase.startDay + weekIndex * 5} - ${phase.startDay + weekIndex * 5 + 4}</span></div>
                    <div class="week-progress"><div class="week-progress-bar"><div class="week-progress-fill" style="width: ${percent}%"></div></div><div class="week-progress-text">${done}/5 days</div></div>
                `;
                
                const grid = document.createElement('div');
                grid.className = 'days-grid';
                for (let d = 0; d < 5; d++) grid.appendChild(this.renderDay(weekIndex, d));
                
                weekDiv.appendChild(header);
                weekDiv.appendChild(grid);
                container.appendChild(weekDiv);
            },
            
            renderDay: function(weekIndex, dayIndex) {
                const dayNum = APP.getDayNumber(this.currentPhase, weekIndex, dayIndex);
                const content = CURRICULUM[this.currentPhase][weekIndex][dayIndex];
                const completed = this.completedDays.includes(dayNum);
                const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
                
                const card = document.createElement('div');
                card.className = `day-card ${completed ? 'completed' : ''}`;
                card.dataset.day = dayNum;
                card.innerHTML = `
                    <div class="day-header"><div class="day-name"><i class="fas fa-calendar-day"></i>Day ${dayNum}: ${dayNames[dayIndex]}</div>${completed ? '<i class="fas fa-check-circle check-icon"></i>' : ''}</div>
                    <div class="slot"><div class="slot-label"><i class="fas fa-play"></i> WATCH</div><a href="${content.watch.url}" target="_blank" rel="noopener noreferrer">${content.watch.text}</a></div>
                    <div class="slot"><div class="slot-label"><i class="fas fa-book"></i> READ</div><a href="${content.read.url}" target="_blank" rel="noopener noreferrer">${content.read.text}</a></div>
                    <div class="slot"><div class="slot-label"><i class="fas fa-flask"></i> LAB</div><a href="${content.lab.url}" target="_blank" rel="noopener noreferrer">${content.lab.text}</a></div>
                    <div class="slot"><div class="slot-label"><i class="fas fa-pen"></i> NOTES</div><div class="note-text">${content.notes}</div><div class="slot-note">✍️ Write in your notebook</div></div>
                    <button class="mark-btn ${completed ? 'done' : ''}" ${completed ? 'disabled' : ''}>${completed ? '✓ Completed' : '✓ Mark Done'}</button>
                `;
                
                const btn = card.querySelector('.mark-btn');
                if (!completed) {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        if (this.completedDays.includes(dayNum)) return;
                        this.completedDays.push(dayNum);
                        this.saveData();
                        btn.textContent = '✓ Completed';
                        btn.classList.add('done');
                        btn.disabled = true;
                        card.classList.add('completed');
                        const headerDiv = card.querySelector('.day-header');
                        if (!headerDiv.querySelector('.check-icon')) {
                            const check = document.createElement('i');
                            check.className = 'fas fa-check-circle check-icon';
                            headerDiv.appendChild(check);
                        }
                        this.updateWeekProgress(dayNum);
                        const toast = document.getElementById('toastMsg');
                        if (toast) { toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 2000); }
                    };
                }
                return card;
            },
            
            updateWeekProgress: function(dayNum) {
                for (let p = 0; p < APP.phases.length; p++) {
                    const phase = APP.phases[p];
                    if (dayNum >= phase.startDay && dayNum <= phase.startDay + (phase.weeks * 5) - 1 && p === this.currentPhase) {
                        const weekIdx = Math.floor((dayNum - phase.startDay) / 5);
                        const weekCard = document.querySelector(`.week-card[data-week="${weekIdx}"]`);
                        if (weekCard) {
                            let done = 0;
                            for (let d = 0; d < 5; d++) if (this.completedDays.includes(APP.getDayNumber(p, weekIdx, d))) done++;
                            const fill = weekCard.querySelector('.week-progress-fill');
                            const text = weekCard.querySelector('.week-progress-text');
                            if (fill) fill.style.width = `${(done / 5) * 100}%`;
                            if (text) text.textContent = `${done}/5 days`;
                        }
                        break;
                    }
                }
            },
            
            updateProgress: function() {
                const done = this.completedDays.length;
                const percent = (done / APP.totalDays) * 100;
                const fill = document.getElementById('overallFill');
                const percentSpan = document.getElementById('overallPercent');
                const doneSpan = document.getElementById('completedDays');
                if (fill) fill.style.width = `${percent}%`;
                if (percentSpan) percentSpan.textContent = `${Math.round(percent)}%`;
                if (doneSpan) doneSpan.textContent = done;
            }
        };
        
        document.addEventListener('DOMContentLoaded', () => Tracker.init());
    </script>
</body>
</html>
